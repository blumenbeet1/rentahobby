{% extends 'base.html' %}

{% block title %}Hobby hinzufügen - Rent a Hobby{% endblock %}

{% block content %}
<div class="add-hobby-page">
    <h1>Neues Hobby hinzufügen</h1>
    
    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label for="name">Name des Hobbys*</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="category">Kategorie</label>
                <input type="text" id="category" name="category" placeholder="z.B. Sport, Kunst, Musik">
            </div>
            
            <div class="form-group">
                <label for="description">Beschreibung</label>
                <textarea id="description" name="description" rows="5" placeholder="Beschreibe dein Hobby..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="price_per_day">Preis pro Tag (€)*</label>
                <input type="number" id="price_per_day" name="price_per_day" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="image_url">Bild-URL</label>
                <input type="url" id="image_url" name="image_url" placeholder="https://example.com/image.jpg">
            </div>
            
            <button type="submit" class="btn-primary">Hobby hinzufügen</button>
            <a href="{{ url_for('my_hobbies') }}" class="btn-secondary">Abbrechen</a>
        </form>
    </div>
</div>
{% endblock %}
